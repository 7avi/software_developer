<section class="section team">
  <div class="container">
    <div class="team__header">
      <span class="section-label">Echipa</span>
      <h2 class="section-title">Oamenii din spatele proiectelor</h2>
    </div>

    <div class="team__grid">
      @for (m of members; track m.name) {
        <article class="team-card">
          <div class="team-card__avatar">{{ m.initials }}</div>
          <h3 class="team-card__name">{{ m.name }}</h3>
          <p class="team-card__role">{{ m.role }}</p>
        </article>
      }
    </div>
  </div>
</section>
