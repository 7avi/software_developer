<section class="section testimonials">
  <div class="container">
    <div class="testimonials__header">
      <span class="section-label">Testimoniale</span>
      <h2 class="section-title">Ce spun clienții noștri</h2>
    </div>

    <div class="testimonials__grid">
      @for (t of testimonials; track t.author) {
        <blockquote class="testimonial-card">
          <p class="testimonial-card__quote">"{{ t.quote }}"</p>
          <footer class="testimonial-card__footer">
            <div class="testimonial-card__avatar">{{ t.initials }}</div>
            <div>
              <cite class="testimonial-card__author">{{ t.author }}</cite>
              <span class="testimonial-card__company">{{ t.company }}</span>
            </div>
          </footer>
        </blockquote>
      }
    </div>
  </div>
</section>
