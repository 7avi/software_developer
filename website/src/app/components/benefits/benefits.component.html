<section class="section benefits">
  <div class="container">
    <div class="benefits__header">
      <span class="section-label">Beneficii</span>
      <h2 class="section-title">Avansează digital cu cele mai bune instrumente</h2>
    </div>

    <div class="benefits__grid">
      @for (b of benefits; track b.title) {
        <article class="benefit-card">
          <span class="benefit-card__icon">{{ b.icon }}</span>
          <h3 class="benefit-card__title">{{ b.title }}</h3>
          <p class="benefit-card__desc">{{ b.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
